name: CodeQL

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: '23 11 * * 1'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        language:
          - javascript-typescript

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Detect code scanning availability
        id: feature
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd
        with:
          script: |
            try {
              await github.request('GET /repos/{owner}/{repo}/code-scanning/default-setup', {
                owner: context.repo.owner,
                repo: context.repo.repo,
              });
              core.setOutput('enabled', 'true');
            } catch (error) {
              core.notice(`Skipping CodeQL upload because code scanning is unavailable: ${error.message}`);
              core.setOutput('enabled', 'false');
              core.setOutput('reason', error.message);
            }

      - name: Initialize CodeQL
        if: steps.feature.outputs.enabled == 'true'
        uses: github/codeql-action/init@b8bb9f28b8d3f992092362369c57161b755dea45
        with:
          languages: ${{ matrix.language }}

      - name: Autobuild
        if: steps.feature.outputs.enabled == 'true'
        uses: github/codeql-action/autobuild@b8bb9f28b8d3f992092362369c57161b755dea45

      - name: Analyze
        if: steps.feature.outputs.enabled == 'true'
        uses: github/codeql-action/analyze@b8bb9f28b8d3f992092362369c57161b755dea45

      - name: Report unavailable feature
        if: steps.feature.outputs.enabled != 'true'
        run: |
          echo "Code scanning upload skipped because the repository feature is unavailable."
          echo "${{ steps.feature.outputs.reason }}"
