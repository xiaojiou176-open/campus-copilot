name: Security Hygiene

on:
  pull_request:
  push:
    branches:
      - main
      - "codex/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: security-hygiene-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  GITLEAKS_VERSION: 8.30.1
  GITLEAKS_LINUX_X64_SHA256: 551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb
  TRUFFLEHOG_VERSION: 3.94.2
  TRUFFLEHOG_LINUX_AMD64_SHA256: 6ff6854f7f663c208c23a3d9be37d2333d15857c28cbe7f008a7fc910a88768d
  TRIVY_VERSION: 0.69.3
  TRIVY_LINUX_64BIT_SHA256: 1816b632dfe529869c740c0913e36bd1629cb7688bd5634f4a858c1d57c88b75
  ZIZMOR_VERSION: 1.23.1
  ZIZMOR_LINUX_X64_SHA256: 67a8df0a14352dd81882e14876653d097b99b0f4f6b6fe798edc0320cff27aff

jobs:
  security-hygiene:
    name: Security Hygiene
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320
        with:
          version: 10.22.0

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run pre-commit hooks
        uses: pre-commit/action@2c7b3805fd2a0fd8c1884dcaebf91fc102a13ecd
        with:
          extra_args: --all-files --hook-stage pre-commit

      - name: Install gitleaks
        run: |
          curl -fsSL -o /tmp/gitleaks.tar.gz "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          echo "${GITLEAKS_LINUX_X64_SHA256}  /tmp/gitleaks.tar.gz" | sha256sum --check --
          mkdir -p "${RUNNER_TEMP}/bin"
          tar -xzf /tmp/gitleaks.tar.gz -C "${RUNNER_TEMP}/bin" gitleaks
          echo "${RUNNER_TEMP}/bin" >> "${GITHUB_PATH}"

      - name: Run gitleaks
        run: gitleaks git "${GITHUB_WORKSPACE}" --no-banner --redact

      - name: Install trufflehog
        run: |
          curl -fsSL -o /tmp/trufflehog.tar.gz "https://github.com/trufflesecurity/trufflehog/releases/download/v${TRUFFLEHOG_VERSION}/trufflehog_${TRUFFLEHOG_VERSION}_linux_amd64.tar.gz"
          echo "${TRUFFLEHOG_LINUX_AMD64_SHA256}  /tmp/trufflehog.tar.gz" | sha256sum --check --
          mkdir -p "${RUNNER_TEMP}/bin"
          tar -xzf /tmp/trufflehog.tar.gz -C "${RUNNER_TEMP}/bin" trufflehog
          echo "${RUNNER_TEMP}/bin" >> "${GITHUB_PATH}"

      - name: Run trufflehog
        run: trufflehog git "file://${GITHUB_WORKSPACE}" --no-update --only-verified

      - name: Install trivy
        run: |
          curl -fsSL -o /tmp/trivy.tar.gz "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz"
          echo "${TRIVY_LINUX_64BIT_SHA256}  /tmp/trivy.tar.gz" | sha256sum --check --
          mkdir -p "${RUNNER_TEMP}/bin"
          tar -xzf /tmp/trivy.tar.gz -C "${RUNNER_TEMP}/bin" trivy
          echo "${RUNNER_TEMP}/bin" >> "${GITHUB_PATH}"

      - name: Run trivy filesystem scan
        run: trivy fs --scanners vuln,misconfig --severity HIGH,CRITICAL --ignore-unfixed --exit-code 1 --no-progress .

      - name: Install zizmor
        run: |
          curl -fsSL -o /tmp/zizmor.tar.gz "https://github.com/zizmorcore/zizmor/releases/download/v${ZIZMOR_VERSION}/zizmor-x86_64-unknown-linux-gnu.tar.gz"
          echo "${ZIZMOR_LINUX_X64_SHA256}  /tmp/zizmor.tar.gz" | sha256sum --check --
          mkdir -p "${RUNNER_TEMP}/bin"
          tar -xzf /tmp/zizmor.tar.gz -C "${RUNNER_TEMP}/bin"
          echo "${RUNNER_TEMP}/bin" >> "${GITHUB_PATH}"

      - name: Run zizmor
        run: zizmor .github/workflows/*.yml
