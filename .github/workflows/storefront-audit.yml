name: Storefront Audit

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: storefront-audit-${{ github.ref }}
  cancel-in-progress: true

jobs:
  storefront:
    name: Storefront
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320
        with:
          version: 10.22.0

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run storefront governance checks
        run: |
          pnpm check:public-surface
          pnpm check:english-canonical
          pnpm check:actions-pinning
          pnpm check:docs:ssot

      - name: Manual follow-up reminder
        run: |
          echo "Manual lane only:"
          echo "- Review the current maintainership checklist before any owner-side launch action"
          echo "- Review docs/storefront-assets.md"
          echo "- If assets changed, re-capture screenshots locally and review them before merge"
