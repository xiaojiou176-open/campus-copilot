name: Bug report
description: Report a repository or product bug with clear reproduction steps.
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is broken in one or two sentences?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Provide the minimum steps to reproduce.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: dropdown
    id: boundary
    attributes:
      label: Affected surface
      options:
        - extension
        - api
        - adapters
        - storage
        - docs/governance
        - workflow/ci
    validations:
      required: true
