name: Feature request
description: Propose a feature grounded in the repository's local-first product boundaries.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user problem should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the proposed capability and its product boundary.
    validations:
      required: true
  - type: textarea
    id: non_goals
    attributes:
      label: Non-goals
      description: What should this explicitly avoid?
  - type: dropdown
    id: validation_lane
    attributes:
      label: Expected validation lane
      options:
        - required deterministic repo gate
        - optional local smoke
        - manual live validation
        - unknown
