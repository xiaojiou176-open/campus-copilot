minimum_pre_commit_version: "3.7.1"
default_install_hook_types:
  - pre-commit

repos:
  - repo: local
    hooks:
      - id: campus-verify-governance
        name: campus verify governance
        entry: pnpm verify:governance
        language: system
        pass_filenames: false
        always_run: true
        stages:
          - pre-commit
  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.12
    hooks:
      - id: actionlint
        stages:
          - pre-commit
